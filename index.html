<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scanner Facial Mobile Pro</title>
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body { font-family: Arial, sans-serif; padding: 15px; max-width: 600px; margin: auto; text-align: center; background-color: #f4f4f9; }
        
        .video-container {
            position: relative; width: 100%; max-width: 400px; margin: 10px auto;
            border: 3px solid #333; border-radius: 12px; overflow: hidden;
            background-color: #000; aspect-ratio: 3/4;
        }
        
        #videoElement, #canvasElement { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); display: block; }
        #canvasElement { position: absolute; top: 0; left: 0; pointer-events: none; }

        .botoes-container { display: flex; flex-direction: column; gap: 10px; margin-top: 15px; }
        button { padding: 15px; font-size: 16px; font-weight: bold; cursor: pointer; color: white; border: none; border-radius: 8px;}
        button:disabled { background: #ccc; cursor: not-allowed; }
        
        #btnStartCamera { background: #007bff; }
        #btnToggleMask { background: #6f42c1; display: none; } 
        #btnRecord { background: #28a745; display: none; }
        #btnStop { background: #d9534f; display: none; }
        #btnDownloadCSV { background: #6c757d; margin-top: 15px; }
        
        #status { margin-top: 10px; font-weight: bold; color: #d9534f; }
        #contador { font-size: 16px; color: #28a745; font-weight: bold; margin-top: 5px; display: none; }
        
        /* Estilos do Container do Gráfico e Seletor */
        .chart-container {
            width: 100%; max-width: 400px; margin: 20px auto 40px auto;
            background: white; padding: 15px; border-radius: 12px;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.1);
            display: none; /* Escondido até terminar a gravação */
            box-sizing: border-box;
        }
        
        .seletor-box { margin-bottom: 15px; text-align: left; }
        .seletor-box label { font-size: 14px; font-weight: bold; color: #333; display: block; margin-bottom: 5px; }
        select { width: 100%; padding: 10px; font-size: 16px; border-radius: 6px; border: 1px solid #ccc; }
        
        #meuGrafico { width: 100% !important; height: auto !important; display: block; }
    </style>
</head>
<body>

    <h2>Análise Facial ao Vivo</h2>
    
    <div id="status">Carregando IA...</div>
    <div id="contador">Frames: 0</div>
    
    <div class="video-container">
        <video id="videoElement" autoplay playsinline></video>
        <canvas id="canvasElement"></canvas>
    </div>

    <div class="botoes-container">
        <button id="btnStartCamera" disabled>Ligar Câmera</button>
        <button id="btnToggleMask">👁️ Ocultar Máscara</button>
        <button id="btnRecord">🔴 Iniciar Gravação</button>
        <button id="btnStop">⏹ Parar e Ver Resultados</button>
    </div>

    <div class="chart-container" id="chartContainer">
        
        <div class="seletor-box">
            <label for="seletorMetrica">Visualizar movimento de:</label>
            <select id="seletorMetrica">
                <option value="boca">Abertura da Boca</option>
                <option value="olho_esq">Piscar - Olho Esquerdo</option>
                <option value="olho_dir">Piscar - Olho Direito</option>
                <option value="sobrancelha">Elevação - Sobrancelha Esq.</option>
            </select>
        </div>

        <canvas id="meuGrafico"></canvas>
        <button id="btnDownloadCSV" style="width: 100%;">Baixar CSV (Todos os 468 Pontos)</button>
    </div>

    <script type="module">
        import { FaceLandmarker, FilesetResolver, DrawingUtils } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.0/vision_bundle.js";

        const video = document.getElementById('videoElement');
        const canvas = document.getElementById('canvasElement');
        const canvasCtx = canvas.getContext('2d');
        const statusText = document.getElementById('status');
        const contadorText = document.getElementById('contador');
        
        const btnStartCamera = document.getElementById('btnStartCamera');
        const btnToggleMask = document.getElementById('btnToggleMask');
        const btnRecord = document.getElementById('btnRecord');
        const btnStop = document.getElementById('btnStop');
        const btnDownloadCSV = document.getElementById('btnDownloadCSV');
        
        const chartContainer = document.getElementById('chartContainer');
        const seletorMetrica = document.getElementById('seletorMetrica');

        let faceLandmarker;
        let drawingUtils;
        let serieTemporal = []; 
        let isCameraAtiva = false;
        let isGravando = false;
        let mostrarMascara = true; 
        let lastVideoTime = -1;
        let tempoInicioGravacao = 0;
        let meuGrafico = null; 

        // 0. Atualizar o gráfico se o usuário mudar o menu suspendo
        seletorMetrica.addEventListener('change', () => {
            if (serieTemporal.length > 0) gerarGrafico();
        });

        btnToggleMask.addEventListener('click', () => {
            mostrarMascara = !mostrarMascara;
            btnToggleMask.innerText = mostrarMascara ? "👁️ Ocultar Máscara" : "👁️ Mostrar Máscara";
        });

        // 1. Inicializa a IA
        async function carregarModelo() {
            try {
                const vision = await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.0/wasm");
                faceLandmarker = await FaceLandmarker.createFromOptions(vision, {
                    baseOptions: {
                        modelAssetPath: "https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task",
                        delegate: "CPU"
                    },
                    outputFaceBlendshapes: false,
                    runningMode: "VIDEO",
                    numFaces: 1
                });
                
                drawingUtils = new DrawingUtils(canvasCtx);
                statusText.innerText = "IA Pronta!";
                statusText.style.color = "green";
                btnStartCamera.disabled = false;
            } catch (erro) {
                statusText.innerText = "Erro na IA: " + erro.message;
            }
        }
        carregarModelo();

        // 2. Ligar a Câmera
        btnStartCamera.addEventListener('click', async () => {
            const stream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: "user", width: { ideal: 640 }, height: { ideal: 480 } } 
            });
            video.srcObject = stream;
            isCameraAtiva = true;
            
            video.addEventListener("loadeddata", () => {
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                btnStartCamera.style.display = "none";
                btnToggleMask.style.display = "block"; 
                btnRecord.style.display = "block";
                statusText.innerText = "Câmera Ativa. Posicione o rosto e grave.";
                processarCamera();
            });
        });

        // 3. Loop contínuo da Câmera
        function processarCamera() {
            if (!isCameraAtiva) return;

            let startTimeMs = performance.now();
            if (lastVideoTime !== video.currentTime) {
                lastVideoTime = video.currentTime;
                const resultados = faceLandmarker.detectForVideo(video, startTimeMs);

                canvasCtx.clearRect(0, 0, canvas.width, canvas.height);

                if (resultados.faceLandmarks && resultados.faceLandmarks.length > 0) {
                    const marcos = resultados.faceLandmarks[0];

                    if (mostrarMascara) {
                        drawingUtils.drawConnectors(marcos, FaceLandmarker.FACE_LANDMARKS_TESSELATION, { color: "#C0C0C070", lineWidth: 1 });
                    }

                    if (isGravando) {
                        let tempoAtual = (performance.now() - tempoInicioGravacao) / 1000;
                        
                        // Preparando os 468 pontos completos para o CSV
                        let coordenadasDoFrame = [];
                        for (let i = 0; i < 468; i++) {
                            coordenadasDoFrame.push(marcos[i].x.toFixed(5));
                            coordenadasDoFrame.push(marcos[i].y.toFixed(5));
                            coordenadasDoFrame.push(marcos[i].z.toFixed(5));
                        }

                        // Calculando as 4 métricas específicas em tempo real
                        let metricaBoca = Math.abs(marcos[14].y - marcos[13].y); // Distância vertical boca
                        let metricaOlhoEsq = Math.abs(marcos[159].y - marcos[145].y); // Distância vertical olho esq
                        let metricaOlhoDir = Math.abs(marcos[386].y - marcos[374].y); // Distância vertical olho dir
                        let metricaSobrancelha = Math.abs(marcos[70].y - marcos[159].y); // Distância sobrancelha pro olho

                        // Salvamos TUDO no nosso "banco de dados" temporário
                        serieTemporal.push({
                            tempo_segundos: tempoAtual.toFixed(3),
                            dadosCSV: coordenadasDoFrame,
                            boca: metricaBoca,
                            olho_esq: metricaOlhoEsq,
                            olho_dir: metricaOlhoDir,
                            sobrancelha: metricaSobrancelha
                        });

                        contadorText.innerText = `Gravando... ${serieTemporal.length} frames`;
                    }
                }
            }
            window.requestAnimationFrame(processarCamera);
        }

        // 4. Iniciar Gravação
        btnRecord.addEventListener('click', () => {
            serieTemporal = []; 
            isGravando = true;
            tempoInicioGravacao = performance.now();
            chartContainer.style.display = "none"; 
            btnRecord.style.display = "none";
            btnStop.style.display = "block";
            contadorText.style.display = "block";
            statusText.innerText = "Gravando Movimentos...";
            statusText.style.color = "red";
        });

        // 5. Parar Gravação e GERAR GRÁFICO
        btnStop.addEventListener('click', () => {
            isGravando = false;
            btnStop.style.display = "none";
            btnRecord.style.display = "block";
            btnRecord.innerText = "🔄 Gravar Nova Sessão";
            statusText.innerText = "Análise Pronta! Altere o filtro abaixo.";
            statusText.style.color = "green";
            
            if (serieTemporal.length === 0) return alert("Nenhum rosto detectado!");

            gerarGrafico();
            chartContainer.style.display = "block";
            
            setTimeout(() => {
                chartContainer.scrollIntoView({ behavior: 'smooth', block: 'end' });
            }, 300);
        });

        // ==========================================
        // LÓGICA DO GRÁFICO DINÂMICO
        // ==========================================
        function gerarGrafico() {
            const ctx = document.getElementById('meuGrafico').getContext('2d');
            
            // Pega o valor atual do menu suspenso (ex: "boca", "olho_esq")
            const filtroEscolhido = seletorMetrica.value;
            const nomeFiltro = seletorMetrica.options[seletorMetrica.selectedIndex].text;

            const labelsTempo = serieTemporal.map(item => item.tempo_segundos);
            
            // Mapeia os dados do eixo Y de acordo com a escolha do usuário
            const dadosEixoY = serieTemporal.map(item => item[filtroEscolhido]);

            if (meuGrafico) meuGrafico.destroy(); // Apaga o gráfico anterior para desenhar o novo

            // Define uma cor dependendo do filtro para ficar visualmente agradável
            let corLinha = '#007bff'; // Azul padrão (Boca)
            if(filtroEscolhido.includes('olho')) corLinha = '#28a745'; // Verde para olhos
            if(filtroEscolhido === 'sobrancelha') corLinha = '#6f42c1'; // Roxo para sobrancelha

            meuGrafico = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labelsTempo,
                    datasets: [{
                        label: nomeFiltro,
                        data: dadosEixoY,
                        borderColor: corLinha,
                        backgroundColor: corLinha + '33', // Adiciona transparência à cor base
                        borderWidth: 2,
                        pointRadius: 0, 
                        fill: true,
                        tension: 0.4 
                    }]
                },
                options: {
                    responsive: true,
                    scales: {
                        x: { title: { display: true, text: 'Tempo (s)' } },
                        y: { title: { display: true, text: 'Distância' }, beginAtZero: false }
                    }
                }
            });
        }

        // 6. Download CSV OBRIGATÓRIO (Com todos os 468 pontos)
        btnDownloadCSV.addEventListener('click', () => {
            let csvContent = "Tempo_Decorrido(s)";
            for (let i = 0; i < 468; i++) {
                csvContent += `,Pt${i}_X,Pt${i}_Y,Pt${i}_Z`;
            }
            csvContent += "\n";

            serieTemporal.forEach(linha => {
                // Aqui usamos o .dadosCSV que guardou os 468 pontos intactos!
                csvContent += `${linha.tempo_segundos},${linha.dadosCSV.join(',')}\n`;
            });

            const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            const url = URL.createObjectURL(blob);
            link.setAttribute("href", url);
            link.setAttribute("download", `analise_facial_completa.csv`);
            link.style.visibility = 'hidden';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        });
    </script>
</body>
</html>
